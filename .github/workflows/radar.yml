name: Bear Market Radar

on:
  # GitHub Actions schedule cron은 UTC 기준입니다.
  # 00:07 UTC = 09:07 KST
  schedule:
    - cron: '7 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # EPS_SYMBOLS: 선택사항. 예: NVDA,MSFT,AAPL,AMZN,GOOGL,META,AVGO,AMD
        run: python radar.py

      - name: Commit generated history/cache files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv data/sec_cache/*.json || true
          git diff --cached --quiet || git commit -m "Update bear market radar data"
          git push

